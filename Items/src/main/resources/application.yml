server:
  port: 9000

spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/items
    username: items
    password: itemspassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

management:
  health:
    show-details: when-authorized
    group:
      liveness:
        show-details: when-authorized
      readiness:
        show-details: when-authorized
  env:
    show-values: never
  configprops:
    show-values: never

  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

  metrics:
    tags:
      application: items
  info:
    env:
      enabled: true
