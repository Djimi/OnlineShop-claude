name: Build & Push to ECR

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build and push'
        required: true
        type: choice
        options:
          - auth
          - items
          - api-gateway
          - all

permissions:
  id-token: write
  contents: read

jobs:
  build-auth:
    if: github.event.inputs.service == 'auth' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::799111666795:role/github-actions-onlineshop
          aws-region: eu-north-1

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-auth-${{ hashFiles('Auth/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-auth-
            ${{ runner.os }}-maven-

      - name: Build with Maven
        working-directory: Auth
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      - uses: docker/build-push-action@v6
        with:
          context: Auth
          push: true
          tags: 799111666795.dkr.ecr.eu-north-1.amazonaws.com/onlineshop-auth:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-items:
    if: github.event.inputs.service == 'items' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::799111666795:role/github-actions-onlineshop
          aws-region: eu-north-1

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-items-${{ hashFiles('Items/pom.xml', 'common/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-items-
            ${{ runner.os }}-maven-

      - name: Build common dependency
        working-directory: common
        run: chmod +x mvnw && ./mvnw install -DskipTests

      - name: Build with Maven
        working-directory: Items
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      - uses: docker/build-push-action@v6
        with:
          context: Items
          push: true
          tags: 799111666795.dkr.ecr.eu-north-1.amazonaws.com/onlineshop-items:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-api-gateway:
    if: github.event.inputs.service == 'api-gateway' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::799111666795:role/github-actions-onlineshop
          aws-region: eu-north-1

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-api-gateway-${{ hashFiles('api-gateway/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-api-gateway-
            ${{ runner.os }}-maven-

      - name: Build with Maven
        working-directory: api-gateway
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      - uses: docker/build-push-action@v6
        with:
          context: api-gateway
          push: true
          tags: 799111666795.dkr.ecr.eu-north-1.amazonaws.com/onlineshop-api-gateway:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
